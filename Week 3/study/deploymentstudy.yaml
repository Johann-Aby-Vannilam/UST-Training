apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploymentstudy
spec:
  replicas: 3
  selector: 
    matchLabels:
      app: nginxtemp1
  template:
    metadata:
      name: mynginxpod1
      labels:
        app: nginxtemp1
    spec:
      containers:
        - name: nginxtemp1
          image: nginx:1.20
          ports:
            - containerPort: 80